<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Administrativo | Santa Cecília Veículos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="vault.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <style>
        body {
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-base);
        }

        .login-container {
            background-color: var(--surface);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
        }

        .login-container h1 {
            font-family: var(--font-serif);
            font-size: 24px;
            margin-bottom: 24px;
            text-align: center;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-base);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h1>Painel Administrativo</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="admin@santacecilia.com" />
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" required placeholder="Sua senha" />
            </div>
            <button type="submit" class="btn-submit" id="btnSubmit">Entrar</button>
            <button type="button" class="btn-submit" id="btnSignUp" style="margin-top: 10px; background-color: transparent; border: 1px solid var(--primary); color: var(--primary);">Criar Conta Admin</button>
            <div class="error-msg" id="errorMsg">E-mail ou senha inválidos.</div>
        </form>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const btnSubmit = document.getElementById('btnSubmit');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            btnSubmit.classList.add('loading');
            btnSubmit.innerText = 'Entrando...';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            console.log("Tentando login para:", email);

            if (!window.sb) {
                alert("Erro: Cliente Supabase não carregou. Verifique o console.");
                btnSubmit.classList.remove('loading');
                btnSubmit.innerText = 'Entrar';
                return;
            }

            const { data, error } = await window.sb.auth.signInWithPassword({
                email: email,
                password: password,
            });

            btnSubmit.classList.remove('loading');
            btnSubmit.innerText = 'Entrar';

            if (error) {
                console.error("Erro de Login:", error);
                errorMsg.style.display = 'block';
                if (error.message === "Invalid login credentials") {
                    errorMsg.innerHTML = "<strong>Credenciais Inválidas:</strong> O e-mail ou senha estão incorretos, ou a conta ainda não foi criada.<br><br>Clique no botão abaixo para <strong>Criar Conta Admin</strong> se for seu primeiro acesso.";
                } else {
                    errorMsg.innerText = "Erro: " + error.message;
                }
            } else {
                console.log("Login OK! Redirecionando...");
                window.location.href = 'painel-scv-3x1a.html';
            }
        });

        const btnSignUp = document.getElementById('btnSignUp');
        btnSignUp.addEventListener('click', async () => {
            errorMsg.style.display = 'none';
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Preencha e-mail e senha para cadastrar.");
                return;
            }

            if (!window.sb) {
                alert("Erro: Cliente Supabase não carregou.");
                return;
            }

            btnSignUp.innerText = 'Cadastrando...';
            const { data, error } = await window.sb.auth.signUp({
                email: email,
                password: password,
                options: { data: { role: 'admin' } }
            });

            btnSignUp.innerText = 'Criar Conta Admin';

            if (error) {
                console.error("Erro de Cadastro:", error);
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Erro ao cadastrar: " + error.message;
            } else {
                alert("Conta criada com sucesso! Você já pode entrar.");
            }
        });

        // Check if already logged in
        setTimeout(() => {
            if (window.sb) {
                window.sb.auth.getSession().then(({ data: { session } }) => {
                    if (session) {
                        window.location.href = 'painel-scv-3x1a.html';
                    }
                });
            }
        }, 500);
    </script>

</body>

</html>
